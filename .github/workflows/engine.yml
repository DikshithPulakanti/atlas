name: Engine CI (Rust)

on:
  push:
    paths:
      - "engine/**"
      - "proto/**"
  pull_request:
    paths:
      - "engine/**"
      - "proto/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd engine && cargo build --release
      - run: cd engine && cargo test
