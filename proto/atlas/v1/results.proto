syntax = "proto3";

package atlas.v1;

option go_package = "github.com/DikshithPulakanti/atlas/adapters/pkg/proto/atlas/v1";

import "atlas/v1/common.proto";

// ExecuteQueryResponse is a streamed chunk of query results.
message ExecuteQueryResponse {
  repeated ColumnData columns = 1;
  int32 row_count = 2;
  bool is_last = 3;
  QueryMetadata metadata = 4;  // Populated only on the last batch
}

// QueryMetadata carries execution statistics for the completed query.
message QueryMetadata {
  int64 total_rows = 1;
  int64 execution_time_ms = 2;
  repeated string sources_queried = 3;
  repeated OperatorCost ai_operator_costs = 4;
}

// OperatorCost tracks the cost of a single AI operator invocation.
message OperatorCost {
  string operator_name = 1;
  int64 invocations = 2;
  TokenUsage token_usage = 3;
  int64 latency_ms = 4;
}
